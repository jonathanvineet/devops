<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Product List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        a { color: #0066cc; text-decoration: none; margin-right: 10px; }
        a:hover { text-decoration: underline; }
        .add-btn { padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 4px; }
        .add-btn:hover { background-color: #45a049; }
        .delete-btn { color: red; }
    </style>
</head>
<body>
<h1>Product Store</h1>
<a th:href="@{/add}" class="add-btn">Add New Product</a>

<table th:if="${not #lists.isEmpty(products)}">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">ID</td>
            <td th:text="${product.name}">Name</td>
            <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">Price</td>
            <td th:text="${product.quantity}">Quantity</td>
            <td>
                <a th:href="@{/edit/{id}(id=${product.id})}">Edit</a>
                <a th:href="@{/delete/{id}(id=${product.id})}" class="delete-btn" onclick="return confirm('Are you sure?');">Delete</a>
            </td>
        </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(products)}">No products found. <a th:href="@{/add}">Add one</a></p>
</body>
</html>
